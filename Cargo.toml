[package]
name = "ewf-forensic"
version = "0.3.0"
edition = "2021"
rust-version = "1.85"
description = "Forensic integrity analysis and repair for EWF (Expert Witness Format / E01) images"
license = "MIT"
repository = "https://github.com/SecurityRonin/ewf-forensic"
authors = ["Albert Hui"]
keywords = ["forensics", "ewf", "e01", "integrity", "tampering"]
categories = ["parser-implementations"]

[lib]
name = "ewf_forensic"

[dependencies]
flate2 = "1"
md-5 = "0.10"
memmap2 = "0.9"
sha1 = "0.10"

[dev-dependencies]
tempfile = "3"
md-5 = "0.10"
sha1 = "0.10"
