name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@1.96.0 # MUST match rust-toolchain.toml — a cross-target on @stable + a pinned toml = E0463
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ewf-cli

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ewf-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz ewf
          cd ../../..

      - name: Install cargo-wix (Windows)
        if: runner.os == 'Windows'
        run: cargo install cargo-wix

      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        run: cargo wix --no-build --target ${{ matrix.target }} --output ewf-${{ steps.version.outputs.version }}-${{ matrix.target }}.msi -p ewf-cli

      - uses: actions/upload-artifact@v4
        with:
          name: ewf-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: ewf-${{ steps.version.outputs.version }}-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'ewf-*-*-*'
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ewf-*
            artifacts/checksums.txt
          generate_release_notes: true

      - name: Dispatch to homebrew tap
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: SecurityRonin/homebrew-tap
          event-type: update-ewf-formula
          client-payload: '{"version": "${{ github.ref_name }}"}'

  crate:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Publish all three workspace crates. `ewf` (the reader) first since
      # `ewf-cli` depends on it; `ewf-forensic` is independent (it does not yet
      # consume the reader). Each `cargo publish` is idempotent-failing on an
      # already-published version, so a no-op version bump is a no-op release.
      - name: Publish ewf crate (reader)
        run: cargo publish -p ewf
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish ewf-cli crate
        run: cargo publish -p ewf-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish ewf-forensic crate (analyzer)
        run: cargo publish -p ewf-forensic
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  winget:
    needs: release
    runs-on: windows-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: SecurityRonin.ewf
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
          fork-user: securityronin-bot

  deb:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0 # MUST match rust-toolchain.toml — a cross-target on @stable + a pinned toml = E0463
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb --target ${{ matrix.target }} -p ewf-cli

      - name: Find .deb file
        id: find_deb
        run: |
          DEB_FILE=$(find target/${{ matrix.target }}/debian -name '*.deb' | head -1)
          echo "deb_path=$DEB_FILE" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ewf-${{ matrix.arch }}.deb
          path: ${{ steps.find_deb.outputs.deb_path }}

  release-deb:
    needs: [release, deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ewf-*.deb
          path: debs
          merge-multiple: true

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: debs/*.deb
