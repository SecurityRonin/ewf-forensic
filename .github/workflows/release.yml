name: Release

on:
  push:
    tags: ["v[0-9]*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@1.96.0 # MUST match rust-toolchain.toml — a cross-target on @stable + a pinned toml = E0463
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ewf-cli

      - name: Azure login (OIDC)
        if: runner.os == 'Windows'
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Sign Windows .exe (Azure Trusted Signing)
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@208f8af4bf26cf2af8597424e3cb5582801523ba # v2.0.0
        with:
          endpoint: https://neu.codesigning.azure.net
          trusted-signing-account-name: securityronin
          certificate-profile-name: securityronin-public
          files-folder: target/${{ matrix.target }}/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ewf-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz ewf
          cd ../../..

      - name: Install cargo-wix (Windows)
        if: runner.os == 'Windows'
        run: cargo install cargo-wix

      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        run: cargo wix --no-build --target ${{ matrix.target }} --output ewf-${{ steps.version.outputs.version }}-${{ matrix.target }}.msi -p ewf-cli

      - name: Sign Windows .msi (Azure Trusted Signing)
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@208f8af4bf26cf2af8597424e3cb5582801523ba # v2.0.0
        with:
          endpoint: https://neu.codesigning.azure.net
          trusted-signing-account-name: securityronin
          certificate-profile-name: securityronin-public
          files-folder: ${{ github.workspace }}
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com

      - uses: actions/upload-artifact@v4
        with:
          name: ewf-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: ewf-${{ steps.version.outputs.version }}-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'ewf-*-*-*'
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ewf-*
            artifacts/checksums.txt
          generate_release_notes: true

      - name: Dispatch to homebrew tap
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: SecurityRonin/homebrew-tap
          event-type: update-ewf-formula
          client-payload: '{"version": "${{ github.ref_name }}"}'

  crate:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # The `v[0-9]*` tag ships ONLY the CLI crate. The two LIBRARY crates — `ewf`
      # (reader) and `ewf-forensic` (analyzer) — are owned by release-plz (PR-based,
      # on merge to main; see release-plz.yml / release-plz.toml), which bumps,
      # changelogs, and publishes them in dependency order. Publishing them here too
      # would double-publish and fight release-plz's version bookkeeping.
      - name: Publish ewf-cli crate
        run: cargo publish -p ewf-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  winget:
    needs: release
    runs-on: windows-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: SecurityRonin.ewf
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
          fork-user: securityronin-bot

  deb:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0 # MUST match rust-toolchain.toml — a cross-target on @stable + a pinned toml = E0463
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb --target ${{ matrix.target }} -p ewf-cli

      - name: Find .deb file
        id: find_deb
        run: |
          DEB_FILE=$(find target/${{ matrix.target }}/debian -name '*.deb' | head -1)
          echo "deb_path=$DEB_FILE" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ewf-${{ matrix.arch }}.deb
          path: ${{ steps.find_deb.outputs.deb_path }}

  release-deb:
    needs: [release, deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ewf-*.deb
          path: debs
          merge-multiple: true

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: debs/*.deb
