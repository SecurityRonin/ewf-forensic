[advisories]
version = 2
# Transitive, unmaintained-not-vulnerable deps (both superseded, low risk):
# - RUSTSEC-2025-0056: `adler` — dev-dep via blazehash-core 0.2.4; superseded by adler2.
# - RUSTSEC-2025-0119: `number_prefix` — via indicatif's progress bar; unmaintained.
# (The crossbeam RUSTSEC-2026-0204 *vulnerability* was fixed by updating to 0.9.20,
# not ignored.) Remove each ignore once the upstream dep drops the unmaintained crate.
# - RUSTSEC-2026-0002: `console` (`IterMut` Stacked-Borrows unsoundness under Miri) —
#   reached only through indicatif's progress bar (a UI dep, not the parser path);
#   not a runtime vulnerability. Remove once indicatif/console ship the fix.
ignore = ["RUSTSEC-2025-0056", "RUSTSEC-2025-0119", "RUSTSEC-2026-0002"]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

# Consolidating the reader (rayon/crossbeam) and the analyzer (indicatif/memmap2)
# dep graphs introduces transitive duplicates (e.g. two windows-sys majors) that
# neither standalone repo had. Downgraded to a warning for the combined workspace
# — forcing a single version across two large, independently-maintained subtrees
# is not worth a hard CI fail. Advisories/licenses/sources stay strict.
[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
